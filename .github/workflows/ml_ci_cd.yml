name: SmartCertify ML CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  ML_API_KEY: "test-api-key"

jobs:
  test-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Generate synthetic data
        run: |
          python -m app.data.generate_synthetic

      - name: Train all models
        run: |
          python -m app.models.fraud_detection.train

      - name: Run model evaluation
        run: |
          python -m app.models.fraud_detection.evaluate

      - name: Quality gate — Check F1 score
        run: |
          python -c "
          import pandas as pd
          df = pd.read_csv('plots/model_benchmark.csv')
          best_f1 = df['f1'].max()
          print(f'Best F1 Score: {best_f1}')
          assert best_f1 >= 0.85, f'F1 score {best_f1} is below 0.85 threshold'
          print('✅ Quality gate passed!')
          "

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: trained-models
          path: |
            saved_models/
            plots/

  build-and-push:
    needs: test-and-train
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/smartcertify-ml:latest
            ${{ secrets.DOCKER_USERNAME }}/smartcertify-ml:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
